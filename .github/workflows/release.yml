name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package: ${{ steps.filter.outputs.package }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            package:
              - 'packages/better-translation/**'

  canary:
    needs: changes
    if: ${{ needs.changes.outputs.package == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check publishable package
        run: bun run check:publish

      - name: Set next canary version
        run: |
          node <<'EOF'
          const { execSync } = require("child_process");
          const fs = require("fs");
          const path = "packages/better-translation/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const baseVersion = pkg.version;
          const escapedBaseVersion = baseVersion.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const pattern = new RegExp(`^${escapedBaseVersion}-canary\\.(\\d+)$`);
          let publishedVersions = [];

          try {
            const raw = execSync(`npm view ${pkg.name} versions --json`, {
              encoding: "utf8",
              stdio: ["ignore", "pipe", "pipe"],
            }).trim();
            const parsed = JSON.parse(raw);
            publishedVersions = Array.isArray(parsed) ? parsed : [parsed];
          } catch {
            publishedVersions = [];
          }

          const nextCanary = publishedVersions.reduce((max, version) => {
            const match = typeof version === "string" ? version.match(pattern) : null;
            return match ? Math.max(max, Number(match[1])) : max;
          }, -1) + 1;

          pkg.version = `${baseVersion}-canary.${nextCanary}`;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`Publishing ${pkg.name}@${pkg.version}`);
          EOF

      - name: Build
        run: bun run build:packages

      - name: Publish canary to npm
        run: npm publish -w better-translation --tag canary --access public --provenance

  stable:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check publishable package
        run: bun run check:publish

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: Version packages
          title: Version packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
